services:
  ecommerce.gateway.api:
    image: ${DOCKER_REGISTRY-}ecommercegatewayapi
    build:
      context: eCommerce.Gateway.Api
      dockerfile: Dockerfile
    ports:
      - 5000:5000
    environment:
      ASPNETCORE_URLS: http://+:5000

  ecommerce.users.api:
    image: ${DOCKER_REGISTRY-}ecommerceusersapi
    build:
      context: eCommerce.Users.Api
      dockerfile: Dockerfile
    ports:
      - 5100:5100
    environment:
      ASPNETCORE_URLS: http://+:5100